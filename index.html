<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nasreen Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f4c81, #3fa9f5);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 45px 65px;
            border-radius: 22px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.18);
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
        }

        h1 {
            font-size: 42px;
            color: #0f4c81;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            color: #333;
        }

        .highlight {
            color: #0077cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
         <h1>Testing continous deployment</h1>
        <h>Nasreen Fatima</h1>
        <h2>Registration Number <span class="highlight">10</span></h2>
    </div>
</body>
</html>
